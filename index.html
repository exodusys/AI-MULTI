
<!DOCTYPE html>
<html lang="fr" data-theme="cyber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Interface AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Exo 2', sans-serif; background: #020509; color: #b8d4f0; display: flex; flex-direction: column; height: 100%; overflow: hidden; margin: 0;">

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header id="voanh-header" style="position: sticky; top: 0; z-index: 100; background: rgba(5, 13, 24, 0.95); border-bottom: 1px solid rgba(0,229,255,0.2); backdrop-filter: blur(20px); padding: 0 20px; height: 60px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,229,255,0.1), 0 4px 30px rgba(0,0,0,0.5);">
        <div class="brand" style="display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0;">
            <div class="brand-logo" style="width: 36px; height: 36px; position: relative; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 36px; height: 36px; filter: drop-shadow(0 0 6px rgba(0,229,255,0.8));">
                    <polygon points="18,2 34,12 34,24 18,34 2,24 2,12" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.6"/>
                    <polygon points="18,7 29,13 29,23 18,29 7,23 7,13" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.3"/>
                    <circle cx="18" cy="18" r="4" fill="#00e5ff" opacity="0.9"/>
                    <line x1="18" y1="2" x2="18" y2="7" stroke="#00e5ff" stroke-width="1"/>
                    <line x1="18" y1="29" x2="18" y2="34" stroke="#00e5ff" stroke-width="1"/>
                    <line x1="2" y1="12" x2="7" y2="13" stroke="#00e5ff" stroke-width="1"/>
                    <line x1="34" y1="12" x2="29" y2="13" stroke="#00e5ff" stroke-width="1"/>
                </svg>
            </div>
            <div>
                <div class="brand-name" id="main-brand-name" style="font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; letter-spacing: 6px; color: #e8f4ff; text-shadow: 0 0 20px rgba(0,229,255,0.5);"></div>
            </div>
        </div>

        <div class="header-controls" style="display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: nowrap; overflow: hidden; min-width: 0;">
            <select class="hud-select" id="model-select" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); appearance: none; -webkit-appearance: none; outline: none; min-width: 0; max-width: 180px;"></select>
            <select class="hud-select" id="agent-select" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); appearance: none; -webkit-appearance: none; outline: none; min-width: 0; max-width: 160px;">
                <option value="">▸ NO AGENT</option>
            </select>
            <button class="hud-btn" id="clear-chat" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;">⌫ CLEAR</button>
            <button class="hud-btn" id="new-chat" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;">+ NEW</button>
            <button class="hud-btn" id="open-archives-desktop" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;">⬡ ARCHIVES</button>
            <div class="context-meter" id="context-meter" title="Contexte utilisé" style="display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: #091525; border: 1px solid rgba(0,229,255,0.2); border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 9px; color: #4a6b8a; flex-shrink: 0;">
                <div class="context-bar-track" style="width: 40px; height: 4px; background: #1a3455; border-radius: 2px; overflow: hidden;">
                    <div class="context-bar-fill" id="context-bar" style="height: 100%; background: #00e5ff; border-radius: 2px; transition: width 0.3s; width: 0%;"></div>
                </div>
                <span id="context-label" style="color: #4a6b8a;">0%</span>
            </div>
        </div>

        <div class="header-right" style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            <span class="status-pill" id="api-status" style="display: inline-flex; align-items: center; gap: 5px; font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 20px; background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #4a6b8a; white-space: nowrap; flex-shrink: 0;">
                <span class="status-dot" style="width: 5px; height: 5px; border-radius: 50%; background: currentColor;"></span>OFFLINE
            </span>
            <select class="hud-select" id="theme-select" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); appearance: none; -webkit-appearance: none; outline: none; min-width: 0;">
                <option value="cyber">◈ CYBER</option>
                <option value="midnight">◈ MIDNIGHT</option>
                <option value="light">◈ LIGHT</option>
            </select>
            <button class="hud-btn primary" id="open-api-modal" style="background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,255,157,0.08)); border: 1px solid rgba(0,229,255,0.5); color: #00e5ff; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0; font-weight: 600;">⬡ API KEY</button>
            <button class="hud-btn" id="open-agent-modal" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;">⚙ AGENT</button>
            <button class="hud-btn" id="open-data-modal" style="background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;">⬡ DATA</button>
        </div>
        <!-- BURGER (mobile only) -->
        <button id="burger-btn" title="Menu" style="display: none; background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #00e5ff; font-size: 18px; width: 38px; height: 38px; border-radius: 6px; cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s cubic-bezier(0.4,0,0.2,1);">☰</button>
    </header>

    <!-- ═══════════════════ MOBILE MENU ═══════════════════ -->
    <div id="mobile-menu" style="display: none; position: fixed; top: 60px; left: 0; right: 0; background: rgba(5,13,24,0.98); border-bottom: 1px solid rgba(0,229,255,0.2); backdrop-filter: blur(20px); z-index: 99; padding: 14px 16px; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); animation: menuSlideDown 0.2s ease;">
        <!-- Row 1 : Statut + Thème -->
        <div class="mobile-row" style="display: flex; gap: 8px; align-items: center;">
            <span class="status-pill" id="api-status-mob" style="display: inline-flex; align-items: center; gap: 5px; font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 20px; background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #4a6b8a; white-space: nowrap; flex-shrink: 0;">
                <span class="status-dot" style="width: 5px; height: 5px; border-radius: 50%; background: currentColor;"></span>OFFLINE
            </span>
            <select class="hud-select" id="theme-select-mob" style="flex:1; background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); appearance: none; -webkit-appearance: none; outline: none; min-width: 0;">
                <option value="cyber">◈ CYBER</option>
                <option value="midnight">◈ MIDNIGHT</option>
                <option value="light">◈ LIGHT</option>
            </select>
        </div>
        <!-- Row 2 : Modèle + Agent -->
        <div class="mobile-row" style="display: flex; gap: 8px; align-items: center;">
            <select class="hud-select" id="model-select-mob" style="flex:1; background: #091525; border: 1px solid rgba(0,229,255,0.2); color: #b8d4f0; font-family: '
